# This rule is not used by the project kudeploy-controller itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the kudeploy.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kudeploy-controller
    app.kubernetes.io/managed-by: kustomize
  name: buildrun-editor-role
rules:
- apiGroups:
  - kudeploy.com
  resources:
  - buildruns
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - kudeploy.com
  resources:
  - buildruns/status
  verbs:
  - get
